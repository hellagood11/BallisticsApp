<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ballistics Calculator</title>
    
    <link rel="stylesheet" href="style.css" />

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>
<body>

<div class="container">
    <h2>Ballistics Calculator</h2>
    <div class="input-group">
        <label for="grains">Bullet Weight (Grains):</label>
        <input type="number" id="grains" placeholder="e.g., 124">
    </div>
    <div class="input-group">
        <label for="velocity">Velocity (FPS):</label>
        <input type="number" id="velocity" placeholder="e.g., 1150">
    </div>
    <button id="calc-btn">Calculate</button>

    <div class="results">
        <h3>Imperial Units</h3>
        <p><strong>Kinetic Energy:</strong> <span id="energy-imp">0</span> ft-lbs</p>
        <p><strong>Momentum:</strong> <span id="momentum-imp">0</span> lbs-sec</p>
        
        <hr>
        
        <h3>Metric Units</h3>
        <p><strong>Kinetic Energ    y:</strong> <span id="energy-metric">0</span> Joules</p>
        <p><strong>Momentum:</strong> <span id="momentum-metric">0</span> kg·m/s</p>
    </div>

    <div class="ammo-table-container">
        <h3>Known Ammunition Index</h3>
        <div id="table-output">Loading custom index matrix...</div>
    </div>
    
</div>

<script type="py" src="ballisticCalculations.py"></script>

</body>
</html>
