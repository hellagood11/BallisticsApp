<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ballistics Calculator</title>
    
    <link rel="stylesheet" href="style.css" />

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
</head>
<body>

<div class="container">
    <h2>Ballistics Calculator</h2>
    <div class="input-group">
        <label for="grains">Bullet Weight (Grains):</label>
        <input type="number" id="grains" placeholder="e.g., 124">
    </div>
    <div class="input-group">
        <label for="velocity">Velocity (FPS):</label>
        <input type="number" id="velocity" placeholder="e.g., 1150">
    </div>
    <button py-click="calculate">Calculate</button>

    <div class="results">
        <p><strong>Kinetic Energy:</strong> <span id="energy-out">0</span> ft-lbs</p>
        <p><strong>Momentum:</strong> <span id="momentum-out">0</span> lbs-sec</p>
    </div>
</div>

<script type="py" src="calculator.py"></script>

</body>
</html>
